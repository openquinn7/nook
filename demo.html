<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nook Demo - Interactive Sprite Visualization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body {
      font-family: 'VT323', monospace;
      background-color: #1a1a2e;
      color: #fff;
    }

    #root {
      min-height: 100vh;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 24px;
      color: #7f8c8d;
    }

    .loading::after {
      content: '🌱';
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>

        failure: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"><rect x="4" y="8" width="2" height="2" fill="#E74C3C"/><rect x="5" y="6" width="1" height="1" fill="#E74C3C"/><rect x="26" y="6" width="1" height="1" fill="#E74C3C"/><rect x="8" y="14" width="16" height="14" rx="2" fill="#AED6F1"/><rect x="10" y="16" width="12" height="10" rx="1" fill="#D4E6F1"/><rect x="8" y="6" width="12" height="5" fill="#2C3E50" transform="rotate(-10 8 6)"/><rect x="6" y="10" width="18" height="3" fill="#34495E" transform="rotate(-5 6 10)"/><rect x="10" y="18" width="4" height="3" fill="white" stroke="#2C3E50" stroke-width="1"/><rect x="18" y="18" width="4" height="3" fill="white" stroke="#2C3E50" stroke-width="1"/><rect x="10" y="19" width="2" height="1" fill="#4A4A4A"/><rect x="20" y="19" width="2" height="1" fill="#4A4A4A"/><rect x="12" y="25" width="2" height="1" fill="#4A4A4A"/><rect x="15" y="24" width="2" height="1" fill="#4A4A4A"/><rect x="18" y="25" width="2" height="1" fill="#4A4A4A"/></svg>`,
        sleeping: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"><rect x="18" y="4" width="2" height="2" fill="#9370DB"/><rect x="21" y="2" width="1" height="1" fill="#9370DB"/><rect x="8" y="16" width="16" height="12" rx="2" fill="#AED6F1"/><rect x="10" y="18" width="12" height="8" rx="1" fill="#D4E6F1"/><rect x="10" y="8" width="12" height="5" fill="#2C3E50"/><rect x="6" y="11" width="20" height="3" fill="#34495E"/><rect x="11" y="20" width="3" height="1" fill="#4A4A4A"/><rect x="18" y="20" width="3" height="1" fill="#4A4A4A"/><rect x="14" y="24" width="4" height="1" fill="#4A4A4A"/></svg>`
      }
    };

    const SEED_VARIANTS = {
      worker: { name: 'Worker', color: '#F4D03F', description: 'Diligent and focused', traits: ['efficient', 'reliable', 'thorough'] },
      explorer: { name: 'Explorer', color: '#82E0AA', description: 'Curious and adventurous', traits: ['curious', 'creative', 'adaptive'] },
      scholar: { name: 'Scholar', color: '#AED6F1', description: 'Wise and analytical', traits: ['analytical', 'thoughtful', 'strategic'] },
      seed: { name: 'Seed', color: '#E8D5B7', description: 'Just starting out', traits: ['new', 'growing', 'potential'] }
    };

    const SPRITE_STATES = ['idle', 'working', 'success', 'failure', 'sleeping'];

    // SVG Sprite component
    function Sprite({ variant = 'seed', state = 'idle', size = 64 }) {
      const svg = SVG_SPRITES[variant]?.[state] || SVG_SPRITES.seed.idle;

      const stateAnimations = {
        idle: 'sprite-idle 2s ease-in-out infinite',
        working: 'sprite-working 0.5s ease-in-out infinite',
        success: 'sprite-success 1s ease-out',
        failure: 'sprite-failure 1s ease-out',
        sleeping: 'sprite-sleeping 3s ease-in-out infinite'
      };

      return (
        <div
          style={{
            width: size,
            height: size,
            animation: stateAnimations[state] || stateAnimations.idle,
            transition: 'all 0.3s ease'
          }}
          dangerouslySetInnerHTML={{ __html: svg.replace('viewBox="0 0 32 32"', `viewBox="0 0 32 32" width="${size}" height="${size}"`) }}
        />
      );
    }

    // Onboarding Flow
    function OnboardingFlow({ onComplete }) {
      const [step, setStep] = useState(0);
      const [selectedVariant, setSelectedVariant] = useState(null);

      const handleComplete = () => {
        onComplete?.({ variant: selectedVariant });
      };

      return (
        <div style={{
          minHeight: '100vh',
          backgroundColor: '#1a1a2e',
          color: '#fff',
          padding: '40px',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center'
        }}>
          <style>{`
            @keyframes sprite-idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes sprite-working { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes sprite-success { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }
            @keyframes sprite-failure { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
            @keyframes sprite-sleeping { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
            @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
          `}</style>

          {step === 0 && (
            <>
              <h1 style={{ fontSize: '48px', marginBottom: '8px', background: 'linear-gradient(135deg, #f39c12, #e74c3c)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                🌱 Welcome to Nook
              </h1>
              <p style={{ color: '#7f8c8d', marginBottom: '40px' }}>Choose your seed companion</p>

              <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap', justifyContent: 'center' }}>
                {Object.entries(SEED_VARIANTS).map(([key, variant]) => (
                  <div
                    key={key}
                    onClick={() => setSelectedVariant(key)}
                    style={{
                      backgroundColor: selectedVariant === key ? '#16213e' : '#0f172a',
                      borderRadius: '16px',
                      padding: '32px',
                      width: '220px',
                      textAlign: 'center',
                      cursor: 'pointer',
                      border: selectedVariant === key ? '3px solid #f39c12' : '3px solid transparent',
                      transition: 'all 0.3s ease',
                      transform: selectedVariant === key ? 'scale(1.05)' : 'scale(1)'
                    }}
                  >
                    <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '16px' }}>
                      <Sprite variant={key} state="idle" size={64} />
                    </div>
                    <div style={{ fontSize: '24px', fontWeight: 'bold', marginBottom: '8px', color: variant.color }}>{variant.name}</div>
                    <div style={{ fontSize: '14px', color: '#bdc3c7', marginBottom: '16px' }}>{variant.description}</div>
                    <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', flexWrap: 'wrap' }}>
                      {variant.traits.map(trait => (
                        <span key={trait} style={{ fontSize: '12px', padding: '4px 8px', backgroundColor: 'rgba(255,255,255,0.1)', borderRadius: '4px', color: '#95a5a6' }}>
                          {trait}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>

              <button
                onClick={() => selectedVariant && setStep(1)}
                disabled={!selectedVariant}
                style={{
                  marginTop: '40px',
                  padding: '16px 48px',
                  fontSize: '18px',
                  fontWeight: 'bold',
                  backgroundColor: selectedVariant ? '#f39c12' : '#7f8c8d',
                  color: '#1a1a2e',
                  border: 'none',
                  borderRadius: '8px',
                  cursor: selectedVariant ? 'pointer' : 'not-allowed'
                }}
              >
                Continue →
              </button>
            </>
          )}

          {step === 1 && selectedVariant && (
            <>
              <div style={{ marginBottom: '24px', animation: 'bounce 1s ease infinite' }}>
                <Sprite variant={selectedVariant} state="idle" size={120} />
              </div>
              <h2 style={{ fontSize: '32px', marginBottom: '16px', color: SEED_VARIANTS[selectedVariant].color }}>
                {SEED_VARIANTS[selectedVariant].name}
              </h2>
              <p style={{ fontSize: '18px', color: '#bdc3c7', maxWidth: '400px', textAlign: 'center', margin: '0 auto' }}>
                Your journey begins! Your {SEED_VARIANTS[selectedVariant].name} will earn sparks through work and grow through evolution.
              </p>

              <div style={{ display: 'flex', gap: '16px', marginTop: '32px' }}>
                <button
                  onClick={() => setStep(0)}
                  style={{
                    padding: '16px 32px',
                    fontSize: '18px',
                    backgroundColor: 'transparent',
                    border: '2px solid #7f8c8d',
                    color: '#fff',
                    borderRadius: '8px',
                    cursor: 'pointer'
                  }}
                >
                  ← Back
                </button>
                <button
                  onClick={handleComplete}
                  style={{
                    padding: '16px 48px',
                    fontSize: '18px',
                    fontWeight: 'bold',
                    backgroundColor: '#f39c12',
                    color: '#1a1a2e',
                    border: 'none',
                    borderRadius: '8px',
                    cursor: 'pointer'
                  }}
                >
                  Let's Go! 🚀
                </button>
              </div>
            </>
          )}
        </div>
      );
    }

    // Animated background stars
    function Stars({ count = 30 }) {
      const stars = Array.from({ length: count }, (_, i) => ({
        left: Math.random() * 100 + '%',
        top: Math.random() * 60 + '%',
        size: Math.random() * 3 + 1,
        delay: Math.random() * 2
      }));

      return (
        <div style={{ position: 'absolute', width: '100%', height: '100%', overflow: 'hidden' }}>
          {stars.map((star, i) => (
            <div
              key={i}
              style={{
                position: 'absolute',
                left: star.left,
                top: star.top,
                width: star.size + 'px',
                height: star.size + 'px',
                backgroundColor: '#fff',
                borderRadius: '50%',
                animation: `twinkle ${2 + star.delay}s infinite`,
                animationDelay: star.delay + 's'
              }}
            />
          ))}
          <style>{`
            @keyframes twinkle {
              0%, 100% { opacity: 0.3; }
              50% { opacity: 1; }
            }
          `}</style>
        </div>
      );
    }

    // Animated sprite
    function AnimatedSprite({ variant, state, onClick }) {
      const [position, setPosition] = useState({ x: 200, y: 250 });
      const [direction, setDirection] = useState(1);

      useEffect(() => {
        if (state !== 'idle') return;

        const interval = setInterval(() => {
          setPosition(p => {
            let newX = p.x + direction * 0.5;
            if (newX > 350 || newX < 50) {
              setDirection(d => -d);
              newX = Math.max(50, Math.min(350, newX));
            }
            return { ...p, x: newX };
          });
        }, 16);

        return () => clearInterval(interval);
      }, [state, direction]);

      return (
        <div
          onClick={onClick}
          style={{
            position: 'absolute',
            left: position.x,
            top: position.y,
            cursor: 'pointer',
            transition: 'transform 0.1s'
          }}
        >
          <Sprite variant={variant} state={state} size={64} />
        </div>
      );
    }

    // Main Demo App
    function NookDemo() {
      const [selectedVariant, setSelectedVariant] = useState('worker');
      const [state, setState] = useState('idle');
      const [showWorld, setShowWorld] = useState(false);
      const [showOnboarding, setShowOnboarding] = useState(false);

      return (
        <div style={{
          fontFamily: '"VT323", monospace',
          backgroundColor: '#1a1a2e',
          color: '#fff',
          minHeight: '100vh',
          padding: '20px'
        }}>
          <style>{`
            @keyframes sprite-idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes sprite-working { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes sprite-success { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }
            @keyframes sprite-failure { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
            @keyframes sprite-sleeping { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
            @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
          `}</style>

          {/* Header */}
          <div style={{ textAlign: 'center', marginBottom: '30px' }}>
            <h1 style={{ fontSize: '32px', background: 'linear-gradient(13539c12, #e74cdeg, #f3c)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '8px' }}>
              🌱 Nook Demo
            </h1>
            <p style={{ color: '#7f8c8d', fontSize: '14px' }}>Interactive Sprite Visualization</p>
          </div>

          {/* Onboarding Demo */}
          <div style={{ marginBottom: '30px', textAlign: 'center' }}>
            <h2 style={{ fontSize: '16px', color: '#f39c12', marginBottom: '16px' }}>🎮 Try Onboarding</h2>
            <button
              style={{ padding: '12px 24px', fontSize: '12px', fontFamily: 'inherit', backgroundColor: '#9b59b6', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer' }}
              onClick={() => setShowOnboarding(true)}
            >
              Launch Onboarding Flow
            </button>
          </div>

          {/* Sprite Preview */}
          <div style={{ marginBottom: '30px' }}>
            <h2 style={{ fontSize: '16px', color: '#f39c12', marginBottom: '16px', textAlign: 'center' }}>👀 Sprite Preview</h2>

            <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', justifyContent: 'center', marginBottom: '20px' }}>
              {Object.entries(SEED_VARIANTS).map(([key, v]) => (
                <button
                  key={key}
                  onClick={() => setSelectedVariant(key)}
                  style={{
                    padding: '12px 24px',
                    fontSize: '12px',
                    fontFamily: 'inherit',
                    backgroundColor: selectedVariant === key ? '#f39c12' : '#3498db',
                    color: selectedVariant === key ? '#1a1a2e' : '#fff',
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer'
                  }}
                >
                  {v.name}
                </button>
              ))}
            </div>

            <div style={{ display: 'flex', gap: '40px', justifyContent: 'center', flexWrap: 'wrap' }}>
              {SPRITE_STATES.map(s => (
                <div key={s} style={{ textAlign: 'center' }}>
                  <Sprite variant={selectedVariant} state={s} size={80} />
                  <div style={{ marginTop: '8px', color: '#7f8c8d', fontSize: '12px' }}>{s}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Interactive World */}
          <div style={{ marginBottom: '30px' }}>
            <h2 style={{ fontSize: '16px', color: '#f39c12', marginBottom: '16px', textAlign: 'center' }}>🌍 Interactive World</h2>

            <div style={{ width: '100%', height: '400px', backgroundColor: '#2d3436', borderRadius: '16px', position: 'relative', overflow: 'hidden', marginBottom: '20px' }}>
              <Stars count={30} />
              <div style={{ position: 'absolute', bottom: 0, width: '100%', height: '80px', backgroundColor: '#27ae60' }} />

              {showWorld && (
                <>
                  <AnimatedSprite
                    variant={selectedVariant}
                    state={state}
                    onClick={() => {
                      setState('success');
                      setTimeout(() => setState('idle'), 1500);
                    }}
                  />
                  <div style={{ position: 'absolute', right: '80px', bottom: '100px' }}>
                    <Sprite variant="explorer" state="idle" size={48} />
                  </div>
                  <div style={{ position: 'absolute', left: '100px', bottom: '120px' }}>
                    <Sprite variant="scholar" state="idle" size={40} />
                  </div>
                </>
              )}

              {!showWorld && (
                <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', textAlign: 'center' }}>
                  <button
                    onClick={() => setShowWorld(true)}
                    style={{ fontSize: '16px', padding: '16px 32px', fontFamily: 'inherit', backgroundColor: '#3498db', color: '#fff', border: 'none', borderRadius: '8px', cursor: 'pointer' }}
                  >
                    🌱 Enter the World
                  </button>
                </div>
              )}
            </div>

            {showWorld && (
              <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', justifyContent: 'center' }}>
                {SPRITE_STATES.map(s => (
                  <button
                    key={s}
                    onClick={() => setState(s)}
                    style={{
                      padding: '12px 24px',
                      fontSize: '12px',
                      fontFamily: 'inherit',
                      backgroundColor: state === s ? '#f39c12' : '#3498db',
                      color: state === s ? '#1a1a2e' : '#fff',
                      border: 'none',
                      borderRadius: '4px',
                      cursor: 'pointer'
                    }}
                  >
                    {s}
                  </button>
                ))}
                <button
                  onClick={() => setShowWorld(false)}
                  style={{ padding: '12px 24px', fontSize: '12px', fontFamily: 'inherit', backgroundColor: '#e74c3c', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer' }}
                >
                  Exit
                </button>
              </div>
            )}
          </div>

          {/* Stats Panel */}
          <div style={{ marginBottom: '30px', backgroundColor: '#16213e', borderRadius: '12px', padding: '20px' }}>
            <h2 style={{ fontSize: '16px', color: '#f39c12', marginBottom: '16px' }}>📊 Sample Stats</h2>
            {[['Sparks', '⚡ 1,234'], ['Stage', '3 - Bloom'], ['Path', 'Builder'], ['Branch', 'Architect'], ['Streak', '🔥 7 days'], ['Achievements', '🏆 5']].map(([label, value], i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: i < 5 ? '1px solid rgba(255,255,255,0.1)' : 'none' }}>
                <span>{label}</span>
                <span style={{ color: label === 'Sparks' ? '#f39c12' : '#fff' }}>{value}</span>
              </div>
            ))}
          </div>

          {/* Evolution Tree */}
          <div style={{ marginBottom: '30px' }}>
            <h2 style={{ fontSize: '16px', color: '#f39c12', marginBottom: '16px', textAlign: 'center' }}>🌳 Evolution Tree</h2>
            <div style={{ display: 'flex', gap: '20px', flexWrap: 'wrap', justifyContent: 'center' }}>
              {Object.entries(SEED_VARIANTS).map(([variant, v]) => (
                <div key={variant} style={{ backgroundColor: '#16213e', borderRadius: '12px', padding: '20px', textAlign: 'center', minWidth: '150px' }}>
                  <Sprite variant={variant} state="idle" size={64} />
                  <div style={{ marginTop: '12px', fontWeight: 'bold', color: v.color }}>{v.name}</div>
                  <div style={{ fontSize: '10px', color: '#7f8c8d', marginTop: '4px' }}>Stage 1 - Seed</div>
                </div>
              ))}
            </div>
          </div>

          {/* Onboarding Modal */}
          {showOnboarding && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.9)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ maxWidth: '600px', width: '90%' }}>
                <OnboardingFlow onComplete={(data) => {
                  console.log('Selected:', data);
                  setShowOnboarding(false);
                }} />
                <button
                  onClick={() => setShowOnboarding(false)}
                  style={{ position: 'absolute', top: '20px', right: '20px', padding: '12px 24px', fontSize: '14px', fontFamily: 'inherit', backgroundColor: '#e74c3c', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer' }}
                >
                  ✕ Close
                </button>
              </div>
            </div>
          )}

          {/* Footer */}
          <div style={{ textAlign: 'center', marginTop: '40px', color: '#7f8c8d', fontSize: '12px' }}>
            <p>Nook Protocol v1.0 - AI Agent Economy</p>
            <p>🌱 Where your sprites grow</p>
          </div>
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NookDemo />);
  </script>
</body>
</html>
